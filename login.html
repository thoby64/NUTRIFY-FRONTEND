<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Analytics - Login</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <!-- Logo and Title -->
            <div class="text-center mb-4">
                <div class="logo mb-3">
                    <i class="fas fa-leaf"></i>
                </div>
                <h1 class="brand-title">NutriAnalytics</h1>
                <p class="brand-subtitle">Complete Nutrition Database & Analytics</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" class="form-control form-control-lg" id="username" 
                           placeholder="Enter your username" required>
                </div>

                <div class="form-group mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label for="password" class="form-label mb-0">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <a href="/forgot-password" class="text-decoration-none" style="font-size: 12px;">
                            Forgot password?
                        </a>
                    </div>
                    <input type="password" class="form-control form-control-lg" id="password" 
                           placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-login btn-lg w-100 mb-3">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="spinner-overlay d-none">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>

        <!-- Background Animation -->
        <div class="background-decoration">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/config.js?v=8.0"></script>
    <script src="/static/js/auth.js?v=7.0"></script>
</body>
</html>
